workflows:
  android-debug:
    name: FitPro — Debug APK
    max_build_duration: 30
    environment:
      java: 17
    scripts:
      - name: Set gradlew permissions
        script: chmod +x gradlew
      - name: Build debug APK
        script: ./gradlew assembleDebug --stacktrace
    artifacts:
      - app/build/outputs/apk/debug/*.apk
